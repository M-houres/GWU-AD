services:
  mysql:
    image: mysql:8.0
    container_name: wuhongai-mysql
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: wuhongai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wuhongai-backend
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: sh -c "python -m app.bootstrap && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${WEB_CONCURRENCY:-6}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).getcode() == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - backend_uploads:/app/uploads
      - backend_output:/app/output
      - backend_algorithms:/app/algorithm_packages
    expose:
      - "8000"

  worker-submission:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wuhongai-worker-submission
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: celery -A app.worker_tasks.celery_app worker -l info -Q submission -c ${CELERY_SUBMISSION_CONCURRENCY:-8} --max-tasks-per-child=200
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; from pathlib import Path; import redis; cmd = Path('/proc/1/cmdline').read_bytes().decode('utf-8', 'ignore'); ok = ('celery' in cmd) and redis.Redis.from_url(os.environ['CELERY_BROKER_URL']).ping(); sys.exit(0 if ok else 1)"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s
    volumes:
      - backend_uploads:/app/uploads
      - backend_output:/app/output
      - backend_algorithms:/app/algorithm_packages

  worker-processing:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wuhongai-worker-processing
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: celery -A app.worker_tasks.celery_app worker -l info -Q processing -c ${CELERY_PROCESSING_CONCURRENCY:-4} --max-tasks-per-child=20
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; from pathlib import Path; import redis; cmd = Path('/proc/1/cmdline').read_bytes().decode('utf-8', 'ignore'); ok = ('celery' in cmd) and redis.Redis.from_url(os.environ['CELERY_BROKER_URL']).ping(); sys.exit(0 if ok else 1)"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s
    volumes:
      - backend_uploads:/app/uploads
      - backend_output:/app/output
      - backend_algorithms:/app/algorithm_packages

  worker-maintenance:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wuhongai-worker-maintenance
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: celery -A app.worker_tasks.celery_app worker -l info -Q maintenance,default -c ${CELERY_MAINTENANCE_CONCURRENCY:-2} --max-tasks-per-child=500
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; from pathlib import Path; import redis; cmd = Path('/proc/1/cmdline').read_bytes().decode('utf-8', 'ignore'); ok = ('celery' in cmd) and redis.Redis.from_url(os.environ['CELERY_BROKER_URL']).ping(); sys.exit(0 if ok else 1)"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s
    volumes:
      - backend_uploads:/app/uploads
      - backend_output:/app/output
      - backend_algorithms:/app/algorithm_packages

  worker-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wuhongai-worker-beat
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: celery -A app.worker_tasks.celery_app beat -l info
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; import sys; cmd = Path('/proc/1/cmdline').read_bytes().decode('utf-8', 'ignore'); sys.exit(0 if ('celery' in cmd and 'beat' in cmd) else 1)"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 20s
    volumes:
      - backend_uploads:/app/uploads
      - backend_output:/app/output
      - backend_algorithms:/app/algorithm_packages

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_ENABLE_WECHAT_LOGIN: ${VITE_ENABLE_WECHAT_LOGIN:-false}
        VITE_PAYMENT_TEST_MODE: ${VITE_PAYMENT_TEST_MODE:-false}
    container_name: wuhongai-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "80"
    ports:
      - "127.0.0.1:8080:80"

  edge:
    image: nginx:1.27-alpine
    container_name: wuhongai-edge
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-public.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/restin.top/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/restin.top/privkey.pem:/etc/nginx/certs/privkey.pem:ro

volumes:
  mysql_data:
  redis_data:
  backend_uploads:
  backend_output:
  backend_algorithms:
